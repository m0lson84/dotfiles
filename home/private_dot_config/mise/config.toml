[settings]
env_file                            = ".env"
experimental                        = true
idiomatic_version_file_enable_tools = ["go", "node", "python"]

[settings.python]
compile = false

[tools]
"go:github.com/air-verse/air"            = "latest"
"go:github.com/go-task/task/v3/cmd/task" = "latest"
"go:github.com/rest-sh/restish"          = "latest"
"go:gotest.tools/gotestsum"              = "latest"
"npm:@biomejs/biome"                     = "latest"
"npm:@devcontainers/cli"                 = "latest"
"npm:@playwright/cli"                    = "latest"
"npm:@tailwindcss/cli"                   = "latest"
"npm:@typescript/native-preview"         = "beta"
"npm:@usebruno/cli"                      = "latest"
"npm:aws-cdk"                            = "latest"
"npm:fish-lsp"                           = "latest"
"npm:yarn"                               = "latest"
"pipx:commitizen"                        = "latest"
"pipx:ruff"                              = "latest"

[tools.bun]
version = "1.3"

[tools.go]
version = "1.26"

[tools.node]
version = "lts"

[tools.python]
version = "3.14"

[tools.rust]
version    = "stable"
components = "rust-analyzer"

[tools.zig]
version = "0.16"
